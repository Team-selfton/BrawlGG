<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrawlGG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="container">
      <header class="hero">
        <p class="badge">BRAWL STARS STATS</p>
        <h1>BrawlGG</h1>
        <p class="subtitle">플레이어 태그로 전적, 트로피, 최근 전투를 빠르게 확인하세요.</p>
      </header>

      <section class="auth-strip card">
        <div>
          <h2>계정 인증</h2>
          <p id="auth-status" class="status">인증 상태를 확인하는 중...</p>
        </div>
        <div class="auth-actions">
          <button id="login-button" type="button">Supercell OAuth 로그인</button>
          <button id="logout-button" class="ghost" type="button">로그아웃</button>
        </div>
      </section>

      <main class="grid">
        <section class="card">
          <h2>플레이어 검색</h2>
          <form id="player-form" class="search-form">
            <label for="tag-input">플레이어 태그</label>
            <div class="row">
              <input id="tag-input" name="tag" type="text" placeholder="#2PP 또는 2PP" required />
              <button id="search-button" type="submit">조회</button>
            </div>
          </form>
          <p id="status" class="status">태그를 입력하면 데이터를 불러옵니다.</p>
          <div id="player-panel" class="panel"></div>
        </section>

        <section class="card">
          <h2>글로벌/국가 랭킹</h2>
          <div class="row">
            <label for="ranking-type" class="sr-only">랭킹 타입</label>
            <select id="ranking-type">
              <option value="players">Players</option>
              <option value="clubs">Clubs</option>
              <option value="brawlers">Brawler Leaderboard</option>
            </select>
            <label for="country-select" class="sr-only">국가 선택</label>
            <select id="country-select">
              <option value="global">Global</option>
              <option value="kr">Korea</option>
              <option value="jp">Japan</option>
              <option value="us">United States</option>
              <option value="de">Germany</option>
              <option value="fr">France</option>
            </select>
            <label for="brawler-select" class="sr-only">브롤러 선택</label>
            <select id="brawler-select" class="hidden">
              <option value="16000000">Shelly</option>
            </select>
            <button id="load-ranking" type="button">랭킹 불러오기</button>
          </div>
          <ol id="ranking-list" class="ranking-list"></ol>
        </section>

        <section class="card card-wide">
          <h2>멀티 검색 (Multi-Search)</h2>
          <form id="multi-form" class="search-form">
            <label for="multi-input">여러 플레이어 태그</label>
            <textarea
              id="multi-input"
              rows="3"
              placeholder="#2PP, #8Q8, #YQ9U ... (콤마/공백 구분)"
            ></textarea>
            <button id="multi-button" type="submit">멀티 검색</button>
          </form>
          <p id="multi-status" class="status">여러 태그를 한 번에 조회해 최근 성과를 비교하세요.</p>
          <ul id="multi-list" class="multi-list"></ul>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
