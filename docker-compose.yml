services:
  brawlgg:
    build:
      context: .
      dockerfile: Dockerfile
    image: brawlgg:latest
    container_name: brawlgg-home
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
    ports:
      - "127.0.0.1:${APP_PORT:-8790}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
